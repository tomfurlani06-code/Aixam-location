<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aixam Jean Cauvin Mobilités - Grasse</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap');

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:25px 20px;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

header img{height:65px;margin-bottom:10px;}
.concession-title{font-size:22px;font-weight:700;}
.concession-sub{font-size:14px;color:#bbb;}

.page{display:none;padding:60px 20px;max-width:1100px;margin:auto;}
.page.active{display:block;}

.modeles{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

.card{
background:#1c1c1c;
width:260px;
border-radius:15px;
overflow:hidden;
transition:.3s;
cursor:pointer;
box-shadow:0 0 10px rgba(255,0,0,.3);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px red;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:6px;
border:none;
}

button{
background:red;
border:none;
padding:12px 20px;
color:white;
cursor:pointer;
border-radius:6px;
font-weight:bold;
margin-top:10px;
}

.resume{
background:#1e1e1e;
padding:20px;
border-radius:10px;
margin-top:20px;
}

footer{
background:#000;
padding:30px;
text-align:center;
color:#aaa;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<img src="logo-aixam.png">
<div class="concession-title">JEAN CAUVIN MOBILITÉS</div>
<div class="concession-sub">Concession Officielle Aixam – Grasse</div>
</header>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2 style="text-align:center;">Choisissez votre véhicule</h2>
<div class="modeles" id="container"></div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<h2 id="modeleTitre"></h2>
<input type="text" id="dateRange" placeholder="Sélectionnez vos dates">
<button onclick="calculer()">Calculer le prix</button>
<div class="resume" id="resume"></div>
<button onclick="goForm()">Continuer</button>
<button onclick="changePage(1)">⬅ Retour</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<h2>Vos informations</h2>
<input type="text" id="nom" placeholder="Nom">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="tel" placeholder="Téléphone">
<button onclick="valider()">Envoyer la demande</button>
<button onclick="changePage(2)">⬅ Retour</button>
<div id="confirmation"></div>
</div>

<footer>
Aixam Jean Cauvin Mobilités – Grasse<br>
Concession Agréée Officielle
</footer>

<script>

flatpickr("#dateRange",{mode:"range",minDate:"today"});

const gamme=[
{nom:"Minauto Access",prix:25,img:"minauto.jpg"},
{nom:"City Pack",prix:30,img:"citypack.jpg"},
{nom:"City Sport",prix:33,img:"citysport.jpg"},
{nom:"Coupé Sport",prix:36,img:"coupesport.jpg"},
{nom:"Coupé GTI",prix:40,img:"coupegti.jpg"},
{nom:"Crossover Premium",prix:42,img:"crossover.jpg"},
{nom:"e-City Sport",prix:45,img:"ecity.jpg"}
];

const container=document.getElementById("container");

gamme.forEach(v=>{
container.innerHTML+=`
<div class="card" onclick="selectModele('${v.nom}',${v.prix})">
<img src="${v.img}">
<div class="card-content">
<h3>${v.nom}</h3>
<p>${v.prix}€ / jour</p>
</div>
</div>`;
});

let modeleChoisi="";
let prixJournalier=0;
let jours=0;
let total=0;

function selectModele(nom,prix){
modeleChoisi=nom;
prixJournalier=prix;
document.getElementById("modeleTitre").innerText=
nom+" - "+prix+"€/jour";
changePage(2);
}

function calculer(){
const dates=document.getElementById("dateRange").value.split(" to ");
if(dates.length<2){alert("Sélectionnez une période.");return;}

jours=Math.ceil((new Date(dates[1])-new Date(dates[0]))/(1000*3600*24));
total=jours*prixJournalier;

document.getElementById("resume").innerHTML=
"Durée : "+jours+" jours<br>Total estimé : "+total+" €";
}

function goForm(){
if(total===0){alert("Calculez le prix d'abord.");return;}
changePage(3);
}

function valider(){
const nom=document.getElementById("nom").value;
const email=document.getElementById("email").value;
const tel=document.getElementById("tel").value;

if(!nom||!email||!tel){
alert("Merci de remplir tous les champs.");
return;
}

document.getElementById("confirmation").innerHTML=
"<div class='resume'>"+
"<h3>Demande envoyée ✔</h3>"+
"Modèle : "+modeleChoisi+"<br>"+
"Durée : "+jours+" jours<br>"+
"Total estimé : "+total+" €<br>"+
"Nous vous contactons rapidement."+
"</div>";
}

function changePage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");
window.scrollTo({top:0,behavior:'smooth'});
}

</script>

</body>
</html>
