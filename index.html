<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aixam Jean Cauvin Mobilités - Grasse</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap');

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER PRO */
header{
background:#000;
padding:25px 20px;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

header img{
height:65px;
display:block;
margin:0 auto 15px auto;
}

.concession-title{
font-size:22px;
font-weight:700;
letter-spacing:1px;
}

.concession-sub{
font-size:14px;
color:#bbb;
margin-top:5px;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
background:linear-gradient(to right,#000,#500);
}

.hero h2{
margin:0;
font-size:26px;
}

.hero p{
color:#ccc;
margin-top:10px;
}

/* ETAPES */
section{
display:none;
padding:50px 20px;
max-width:1200px;
margin:auto;
}

.active{
display:block;
animation:fadeIn .5s ease-in-out;
}

.progress{
text-align:center;
margin:25px;
font-weight:bold;
color:red;
}

.modeles{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

.card{
background:#1c1c1c;
width:260px;
border-radius:15px;
overflow:hidden;
transition:.3s;
box-shadow:0 0 10px rgba(255,0,0,.3);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px red;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

button{
background:red;
border:none;
padding:10px 15px;
color:white;
cursor:pointer;
border-radius:6px;
font-weight:bold;
margin:10px 5px;
}

input{
padding:10px;
margin:10px 0;
width:100%;
border-radius:5px;
border:none;
}

.resume{
background:#1e1e1e;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.nav-buttons{
margin-top:20px;
text-align:center;
}

footer{
background:#000;
padding:30px;
text-align:center;
margin-top:50px;
color:#aaa;
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){
.modeles{
flex-direction:column;
align-items:center;
}
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<img src="logo-aixam.png" alt="Logo Aixam">
<div class="concession-title">JEAN CAUVIN MOBILITÉS</div>
<div class="concession-sub">Concession Officielle Aixam – Grasse</div>
</header>

<div class="hero">
<h2>Location Véhicules Sans Permis Aixam</h2>
<p>Votre spécialiste dans les Alpes-Maritimes</p>
</div>

<div class="progress">Étape 1 / 3</div>

<section id="etape1" class="active">
<h2 style="text-align:center;">Choisissez votre modèle</h2>
<div class="modeles" id="container"></div>
</section>

<section id="etape2">
<h2>Choisissez vos dates</h2>
<p id="modeleInfo"></p>

<input type="date" id="dateDebut">
<input type="date" id="dateFin">

<button onclick="calculer()">Calculer</button>

<div class="resume" id="resume"></div>

<div class="nav-buttons">
<button onclick="changerEtape('etape1',1)">⬅ Retour</button>
<button onclick="allerEtape3()">Continuer ➡</button>
</div>
</section>

<section id="etape3">
<h2>Confirmation</h2>

<div class="resume" id="recap"></div>

<input type="text" placeholder="Nom">
<input type="email" placeholder="Email">
<input type="tel" placeholder="Téléphone">

<div class="nav-buttons">
<button onclick="changerEtape('etape2',2)">⬅ Retour</button>
<button onclick="envoyer()">Envoyer la demande</button>
</div>
</section>

<footer>
Aixam Jean Cauvin Mobilités – Grasse<br>
Concession Agréée Officielle
</footer>

<script>
const gamme = [
{nom:"Minauto Access", prix:25, img:"minauto.jpg"},
{nom:"City Pack", prix:30, img:"citypack.jpg"},
{nom:"City Sport", prix:33, img:"citysport.jpg"},
{nom:"Coupé Sport", prix:36, img:"coupesport.jpg"},
{nom:"Coupé GTI", prix:40, img:"coupegti.jpg"},
{nom:"Crossover Premium", prix:42, img:"crossover.jpg"},
{nom:"e-City Sport", prix:45, img:"ecity.jpg"}
];

const container = document.getElementById("container");

gamme.forEach(v=>{
container.innerHTML+=`
<div class="card">
<img src="${v.img}">
<div class="card-content">
<h3>${v.nom}</h3>
<p>${v.prix}€ / jour</p>
<button onclick="choisirModele('${v.nom}',${v.prix})">Choisir</button>
</div>
</div>
`;
});

let modeleChoisi="", prixJournalier=0, totalFinal=0, joursFinal=0;

function choisirModele(modele,prix){
modeleChoisi=modele;
prixJournalier=prix;
document.getElementById("modeleInfo").innerText=
modeleChoisi+" - "+prixJournalier+"€ / jour";
changerEtape("etape2",2);
}

function calculer(){
const debut=new Date(document.getElementById("dateDebut").value);
const fin=new Date(document.getElementById("dateFin").value);
if(!document.getElementById("dateDebut").value||!document.getElementById("dateFin").value){
alert("Choisissez les dates."); return;
}
const diff=(fin-debut)/(1000*3600*24);
if(diff<=0){alert("Date invalide."); return;}
joursFinal=diff;
totalFinal=diff*prixJournalier;
document.getElementById("resume").innerHTML=
"Durée : "+joursFinal+" jours<br>Total : "+totalFinal+"€";
}

function allerEtape3(){
if(totalFinal===0){alert("Calculez le prix."); return;}
document.getElementById("recap").innerHTML=
"Modèle : "+modeleChoisi+
"<br>Durée : "+joursFinal+" jours"+
"<br>Total : "+totalFinal+"€";
changerEtape("etape3",3);
}

function envoyer(){
alert("Votre demande a été envoyée. Jean Cauvin Mobilités vous contactera rapidement.");
location.reload();
}

function changerEtape(id,step){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelector(".progress").innerText="Étape "+step+" / 3";
}
</script>

</body>
</html>
