<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aixam Jean Cauvin Mobilités - Grasse</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

header{
background:black;
padding:20px;
box-shadow:0 0 20px red;
}

header img{
height:60px;
margin-bottom:10px;
}

.page{
display:none;
padding:40px 20px;
animation:fade .4s ease;
}

.active{
display:block;
}

.modeles{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

.card{
background:#1c1c1c;
width:260px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px red;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:15px;
}

input{
padding:12px;
margin:10px 0;
width:250px;
border-radius:6px;
border:none;
}

button{
background:red;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
border-radius:6px;
margin:10px;
}

.resume{
margin-top:20px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
display:inline-block;
}

.confirmation{
background:#1c1c1c;
padding:25px;
border-radius:10px;
display:inline-block;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<img src="logo-aixam.png">
<h3>JEAN CAUVIN MOBILITÉS – GRASSE</h3>
<p>Location Véhicules Sans Permis Aixam</p>
</header>

<!-- PAGE 1 : VEHICULE -->
<div id="page1" class="page active">

<h2>Choisissez votre véhicule</h2>

<div class="modeles">

<div class="card" onclick="choisir('Minauto Access',25)">
<img src="minauto.jpg">
<div class="card-content">
<h3>Minauto Access</h3>
<p>25€ / jour</p>
</div>
</div>

<div class="card" onclick="choisir('City Pack',30)">
<img src="citypack.jpg">
<div class="card-content">
<h3>City Pack</h3>
<p>30€ / jour</p>
</div>
</div>

<div class="card" onclick="choisir('City Sport',33)">
<img src="citysport.jpg">
<div class="card-content">
<h3>City Sport</h3>
<p>33€ / jour</p>
</div>
</div>

</div>

</div>

<!-- PAGE 2 : DATES -->
<div id="page2" class="page">

<h2 id="titreReservation"></h2>

<input type="text" id="dateRange" placeholder="Sélectionnez vos dates">

<br>
<button onclick="calculer()">Calculer le prix</button>

<div class="resume" id="resume"></div>

<br>
<button onclick="allerInfos()">Continuer</button>
<button onclick="retour(1)">⬅ Retour</button>

</div>

<!-- PAGE 3 : INFOS CLIENT -->
<div id="page3" class="page">

<h2>Vos informations</h2>

<input type="text" id="nom" placeholder="Nom">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="telephone" placeholder="Téléphone">

<br>
<button onclick="valider()">Valider la demande</button>
<button onclick="retour(2)">⬅ Retour</button>

<div id="confirmation"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

let modeleChoisi = "";
let prixJournalier = 0;
let totalFinal = 0;
let joursFinal = 0;

flatpickr("#dateRange", {
mode: "range",
minDate: "today"
});

function choisir(modele, prix){
modeleChoisi = modele;
prixJournalier = prix;

document.getElementById("titreReservation").innerText =
"Réservation : " + modele + " (" + prix + "€ / jour)";

changerPage(2);
}

function calculer(){
const dates = document.getElementById("dateRange").value.split(" to ");

if(dates.length < 2){
alert("Choisissez une période.");
return;
}

const debut = new Date(dates[0]);
const fin = new Date(dates[1]);
joursFinal = (fin - debut) / (1000*3600*24);
totalFinal = joursFinal * prixJournalier;

document.getElementById("resume").innerHTML =
"Durée : " + joursFinal + " jours<br>Total estimé : " + totalFinal + " €";
}

function allerInfos(){
if(totalFinal === 0){
alert("Calculez le prix avant de continuer.");
return;
}
changerPage(3);
}

function valider(){
const nom = document.getElementById("nom").value;
const email = document.getElementById("email").value;
const tel = document.getElementById("telephone").value;

if(!nom || !email || !tel){
alert("Veuillez remplir tous les champs.");
return;
}

document.getElementById("confirmation").innerHTML =
"<div class='confirmation'>" +
"<h3>Demande envoyée !</h3>" +
"<p>Merci " + nom + "</p>" +
"<p>Modèle : " + modeleChoisi + "</p>" +
"<p>Durée : " + joursFinal + " jours</p>" +
"<p>Total estimé : " + totalFinal + " €</p>" +
"<p>Nous vous contacterons rapidement.</p>" +
"</div>";
}

function changerPage(numero){
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.remove("active");

document.getElementById("page"+numero).classList.add("active");
}

function retour(numero){
changerPage(numero);
}

</script>

</body>
</html>
