<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aixam Jean Cauvin Mobilités - Grasse</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

/* HEADER */
header{
background:black;
padding:20px;
box-shadow:0 0 20px red;
}

header img{
height:60px;
}

h2{
margin-top:30px;
}

/* PAGES */
.page{
display:none;
padding:40px 20px;
}

.active{
display:block;
}

/* MODELES */
.modeles{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

.card{
background:#1c1c1c;
width:260px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px red;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:15px;
}

/* FORM */
input{
padding:12px;
margin:10px 0;
width:250px;
border-radius:6px;
border:none;
}

button{
background:red;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
border-radius:6px;
margin:10px;
}

.resume{
margin-top:20px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
display:inline-block;
}
</style>
</head>

<body>

<header>
<img src="logo-aixam.png">
<h3>JEAN CAUVIN MOBILITÉS – GRASSE</h3>
</header>

<!-- PAGE 1 : CHOIX VEHICULE -->
<div id="page1" class="page active">

<h2>Choisissez votre véhicule</h2>

<div class="modeles">

<div class="card" onclick="choisir('Minauto Access',25)">
<img src="minauto.jpg">
<div class="card-content">
<h3>Minauto Access</h3>
<p>25€ / jour</p>
</div>
</div>

<div class="card" onclick="choisir('City Pack',30)">
<img src="citypack.jpg">
<div class="card-content">
<h3>City Pack</h3>
<p>30€ / jour</p>
</div>
</div>

<div class="card" onclick="choisir('City Sport',33)">
<img src="citysport.jpg">
<div class="card-content">
<h3>City Sport</h3>
<p>33€ / jour</p>
</div>
</div>

</div>

</div>

<!-- PAGE 2 : RESERVATION -->
<div id="page2" class="page">

<h2 id="titreReservation"></h2>

<input type="text" id="dateRange" placeholder="Sélectionnez vos dates">

<br>
<button onclick="calculer()">Calculer le prix</button>

<div class="resume" id="resume"></div>

<br>
<button onclick="retour()">⬅ Retour</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

let prixJournalier = 0;

flatpickr("#dateRange", {
mode: "range",
minDate: "today"
});

function choisir(modele, prix){
prixJournalier = prix;

document.getElementById("titreReservation").innerText =
"Réservation : " + modele + " (" + prix + "€ / jour)";

document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

function calculer(){
const dates = document.getElementById("dateRange").value.split(" to ");

if(dates.length < 2){
alert("Choisissez une période.");
return;
}

const diff = (new Date(dates[1]) - new Date(dates[0])) / (1000*3600*24);
const total = diff * prixJournalier;

document.getElementById("resume").innerHTML =
"Durée : " + diff + " jours<br>Total : " + total + " €";
}

function retour(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page1").classList.add("active");
document.getElementById("resume").innerHTML = "";
document.getElementById("dateRange").value = "";
}

</script>

</body>
</html>
