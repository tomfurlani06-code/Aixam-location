<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aixam Location</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

header {
    background: black;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

section {
    padding: 40px;
    max-width: 1100px;
    margin: auto;
    display: none;
}

.active {
    display: block;
}

.modeles {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    width: 260px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px red;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

input {
    padding: 10px;
    margin: 10px 0;
    width: 100%;
    border-radius: 5px;
    border: none;
}

.resume {
    background: #222;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>AIXAM LOCATION - Louez dès 14 ans</header>

<!-- ETAPE 1 -->
<section id="etape1" class="active">
<h2>Choisissez votre modèle</h2>

<div class="modeles">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Aixam_Minauto.jpg">
<h3>Minauto</h3>
<p>25€ / jour</p>
<button onclick="choisirModele('Minauto',25)">Choisir</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Aixam_City_2010.jpg">
<h3>City Pack</h3>
<p>29€ / jour</p>
<button onclick="choisirModele('City Pack',29)">Choisir</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Aixam_City_2010.jpg">
<h3>City Sport</h3>
<p>32€ / jour</p>
<button onclick="choisirModele('City Sport',32)">Choisir</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Aixam_Coupe.jpg">
<h3>Coupé Sport</h3>
<p>35€ / jour</p>
<button onclick="choisirModele('Coupé Sport',35)">Choisir</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Aixam_Coupe.jpg">
<h3>Coupé GTI</h3>
<p>39€ / jour</p>
<button onclick="choisirModele('Coupé GTI',39)">Choisir</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Aixam_Crossline.jpg">
<h3>Crossover</h3>
<p>42€ / jour</p>
<button onclick="choisirModele('Crossover',42)">Choisir</button>
</div>

</div>
</section>

<!-- ETAPE 2 -->
<section id="etape2">
<h2>Choisissez vos dates</h2>
<p id="modeleInfo"></p>

<label>Date début</label>
<input type="date" id="dateDebut">

<label>Date fin</label>
<input type="date" id="dateFin">

<button onclick="calculer()">Calculer le prix</button>

<div class="resume" id="resume"></div>

<button onclick="allerEtape3()">Continuer</button>
</section>

<!-- ETAPE 3 -->
<section id="etape3">
<h2>Confirmation</h2>

<div class="resume" id="recap"></div>

<h3>Vos informations</h3>
<input type="text" placeholder="Nom">
<input type="email" placeholder="Email">
<input type="tel" placeholder="Téléphone">

<button onclick="envoyer()">Envoyer la demande</button>
</section>

<script>
let modeleChoisi = "";
let prixJournalier = 0;
let totalFinal = 0;
let joursFinal = 0;

function choisirModele(modele, prix){
    modeleChoisi = modele;
    prixJournalier = prix;

    document.getElementById("modeleInfo").innerText =
        modeleChoisi + " - " + prixJournalier + "€ / jour";

    changerEtape("etape2");
}

function calculer(){
    const debut = new Date(document.getElementById("dateDebut").value);
    const fin = new Date(document.getElementById("dateFin").value);

    if(!document.getElementById("dateDebut").value || !document.getElementById("dateFin").value){
        alert("Veuillez choisir les dates.");
        return;
    }

    const diff = (fin - debut) / (1000*3600*24);

    if(diff <= 0){
        alert("La date de fin doit être après la date de début.");
        return;
    }

    joursFinal = diff;
    totalFinal = diff * prixJournalier;

    document.getElementById("resume").innerHTML =
        "Durée : " + joursFinal + " jours<br>Total : " + totalFinal + "€";
}

function allerEtape3(){
    if(totalFinal === 0){
        alert("Veuillez calculer le prix avant de continuer.");
        return;
    }

    document.getElementById("recap").innerHTML =
        "Modèle : " + modeleChoisi +
        "<br>Durée : " + joursFinal + " jours" +
        "<br>Total : " + totalFinal + "€";

    changerEtape("etape3");
}

function envoyer(){
    alert("Votre demande a été envoyée !");
    location.reload();
}

function changerEtape(id){
    document.querySelectorAll("section").forEach(section=>{
        section.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
