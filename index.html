<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aixam Jean Cauvin Mobilités - Grasse</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
box-shadow:0 0 20px red;
}

header img{
height:60px;
}

.progress{
text-align:center;
margin:20px;
font-weight:bold;
color:red;
}

.page{
display:none;
padding:40px 20px;
animation:fade .4s ease;
max-width:1000px;
margin:auto;
text-align:center;
}

.page.active{
display:block;
}

.modeles{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
margin-top:30px;
}

.card{
background:#1c1c1c;
width:260px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px red;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:15px;
}

input{
padding:12px;
margin:10px 0;
width:280px;
border-radius:6px;
border:none;
}

button{
background:red;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
border-radius:6px;
margin:10px;
transition:0.3s;
}

button:hover{
opacity:0.8;
}

button:disabled{
background:grey;
cursor:not-allowed;
}

.resume{
margin-top:20px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
display:inline-block;
min-width:280px;
}

.confirmation{
background:#1c1c1c;
padding:25px;
border-radius:10px;
margin-top:20px;
display:inline-block;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<img src="logo-aixam.png">
<h3>JEAN CAUVIN MOBILITÉS – GRASSE</h3>
<p>Location Véhicules Sans Permis Aixam</p>
</header>

<div class="progress" id="progress">Étape 1 / 3</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Choisissez votre véhicule</h2>

<div class="modeles">

<div class="card" onclick="choisir('Minauto Access',25)">
<img src="minauto.jpg">
<div class="card-content">
<h3>Minauto Access</h3>
<p>25€ / jour</p>
</div>
</div>

<div class="card" onclick="choisir('City Pack',30)">
<img src="citypack.jpg">
<div class="card-content">
<h3>City Pack</h3>
<p>30€ / jour</p>
</div>
</div>

<div class="card" onclick="choisir('City Sport',33)">
<img src="citysport.jpg">
<div class="card-content">
<h3>City Sport</h3>
<p>33€ / jour</p>
</div>
</div>

</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

<h2 id="titreReservation"></h2>

<input type="text" id="dateRange" placeholder="Sélectionnez vos dates">

<br>
<button onclick="calculer()">Calculer le prix</button>

<div class="resume" id="resume"></div>

<br>
<button id="btnContinuer" onclick="allerInfos()" disabled>Continuer</button>
<button onclick="changerPage(1)">⬅ Retour</button>

</div>

<!-- PAGE 3 -->
<div id="page3" class="page">

<h2>Vos informations</h2>

<input type="text" id="nom" placeholder="Nom">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="telephone" placeholder="Téléphone">

<br>
<button onclick="valider()">Valider la demande</button>
<button onclick="changerPage(2)">⬅ Retour</button>

<div id="confirmation"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
let modeleChoisi="";
let prixJournalier=0;
let totalFinal=0;
let joursFinal=0;

flatpickr("#dateRange",{
mode:"range",
minDate:"today",
dateFormat:"Y-m-d"
});

function choisir(modele,prix){
modeleChoisi=modele;
prixJournalier=prix;

document.getElementById("titreReservation").innerText =
"Réservation : "+modele+" ("+prix+"€ / jour)";

document.getElementById("resume").innerHTML="";
document.getElementById("btnContinuer").disabled=true;

changerPage(2);
}

function calculer(){
const valeur=document.getElementById("dateRange").value;
const dates=valeur.split(" to ");

if(dates.length<2){
alert("Merci de sélectionner une période complète.");
return;
}

const debut=new Date(dates[0]);
const fin=new Date(dates[1]);

joursFinal=Math.ceil((fin-debut)/(1000*3600*24));

if(joursFinal <= 0){
alert("Dates invalides.");
return;
}

totalFinal=joursFinal*prixJournalier;

document.getElementById("resume").innerHTML =
"<strong>Modèle :</strong> "+modeleChoisi+"<br>"+
"<strong>Durée :</strong> "+joursFinal+" jour(s)<br>"+
"<strong>Total estimé :</strong> "+totalFinal+" €";

document.getElementById("btnContinuer").disabled=false;
}

function allerInfos(){
changerPage(3);
}

function valider(){
const nom=document.getElementById("nom").value.trim();
const email=document.getElementById("email").value.trim();
const tel=document.getElementById("telephone").value.trim();

if(!nom || !email || !tel){
alert("Merci de remplir tous les champs.");
return;
}

document.getElementById("confirmation").innerHTML =
"<div class='confirmation'>"+
"<h3>Demande envoyée !</h3>"+
"<p>Merci "+nom+"</p>"+
"<p><strong>Modèle :</strong> "+modeleChoisi+"</p>"+
"<p><strong>Durée :</strong> "+joursFinal+" jour(s)</p>"+
"<p><strong>Total estimé :</strong> "+totalFinal+" €</p>"+
"<p>Un conseiller Aixam Grasse vous contacte rapidement.</p>"+
"</div>";
}

function changerPage(numero){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+numero).classList.add("active");
document.getElementById("progress").innerText="Étape "+numero+" / 3";
}
</script>

</body>
</html>
